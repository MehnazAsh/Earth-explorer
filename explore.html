<html>
<head>
  <title>GeoHop AI Explore</title>

<body>

<div class="app-container">

  <!-- HEADER -->
  <header class="header">
     <div class="logo">
                <span class="logo-icon">🌍</span>
                <h1>GeoHop</h1>
            </div>
     <div class="user-info">
                <span id="userName">Geo Explorer</span>
                <a href="/index.html">Create my Journey</a>
                <button class="btn-icon" id="viewModeBtn" title="Toggle View">🌐</button>
            </div>
  </header>

  <div class="main-layout">

    <!-- LEFT COLUMN -->
    <aside class="sidebar">
      <div style="padding:20px;">

        <input id="queryInput"
               placeholder="e.g. most beautiful islands in the world"
               style="width:100%; padding:10px;" />

        <button id="searchBtn" class="btn btn-primary" style="margin-top:10px;">
          Search
        </button>
<!-- 🕘 Recent Searches -->
  <!-- <div id="searchHistory"></div>
        <!-- RESULTS -->
        <div id="results" style="margin-top:20px;"></div>

        <!-- CTA -->
        <button id="createJourneyBtn" class="btn btn-primary" style="margin-top:20px;">
          Create Journey ✈️
        </button>
         <button id="shareExplorationBtn" class="btn btn-primary" style="margin-top:10px; display:none;">
  🔗 Share my exploration
</button> 

      </div> 
    </aside>

    <!-- RIGHT COLUMN -->
    <main class="map-container">

      <!-- 3D MAP -->
    <gmp-map-3d 
                    id="map3d"
                    center="20,-10,15000000" 
                    tilt="0" 
                    heading="0"
                    range="15000000"
                    mode="satellite">
                </gmp-map-3d>

      <!-- CONTROLS -->
      <div class="map-controls">
        <div class="control-group">
                        <button class="control-btn" id="playBtn" title="Play Journey">
                            <span class="icon">▶</span>
                            <span class="label">Play</span>
                        </button>
                        <button class="control-btn" id="pauseBtn" title="Pause" disabled>
                            <span class="icon">⏸</span>
                            <span class="label">Pause</span>
                        </button>
                        <button class="control-btn" id="resetBtn" title="Reset">
                            <span class="icon">⏮</span>
                            <span class="label">Reset</span>
                        </button>
                    </div>
      </div>
       <!-- Share Modal -->
    <div class="modal" id="shareExploreModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Share Your Journey</h2>
                <button class="modal-close" id="closeExploreModal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Share your travel journey with friends and family:</p>
                <div class="share-link-container">
                  <input type="text" id="journeyExploreName" readonly class="share-link">
                    <input type="text" id="shareExploreLink" readonly class="share-link">
                    <button class="btn btn-copy" id="copyExploreBtn">Copy</button>
                </div>
                <!-- <div class="share-options">
                    <button class="share-btn" id="shareWhatsApp">WhatsApp</button>
                    <button class="share-btn" id="shareTwitter">Twitter</button>
                    <button class="share-btn" id="shareFacebook">Facebook</button>
                </div> -->
            </div>
        </div>
    </div>

    </main>

  </div>

</div>



<!-- Google Maps -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBft3sI8GFrO_Mv55elA0t7zZf73EwN2bI&v=beta&libraries=maps3d,marker,geometry">
</script>
  <!-- 2. Load your main engine -->
<script  src="./app.js"></script>

<!-- 3. THEN load explorer -->
<script  src="./explore.js"></script>

</body>
</html>
